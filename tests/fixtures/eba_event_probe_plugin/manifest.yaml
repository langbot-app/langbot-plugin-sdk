apiVersion: v1
kind: Plugin
metadata:
  author: Codex
  name: EBAEventProbe
  repository: https://github.com/langbot-app/langbot-plugin-sdk
  version: 0.1.0
  description:
    en_US: Probe plugin used to verify EBA EventListener delivery.
    zh_Hans: 用于验证 EBA EventListener 分发的探针插件。
  label:
    en_US: EBA Event Probe
    zh_Hans: EBA 事件探针
  icon: assets/icon.svg
spec:
  config: []
  components:
    EventListener:
      fromDirs:
        - path: components/event_listener/
execution:
  python:
    path: main.py
    attr: EBAEventProbePlugin
